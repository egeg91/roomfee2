<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입실료 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
  --accent: #4f8ef7; --accent2: #7c5cfc; --green: #34c77b; --red: #f05c5c;
  --yellow: #f5a623; --text: #e8eaf6; --text2: #8b90b8; --text3: #555a80;
  --row-h: 48px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
header h1 { font-size: 17px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-stats { display: flex; gap: 10px; margin-left: auto; align-items: center; flex-wrap: wrap; }
.stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 12px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
.stat-chip span { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
.stat-chip.green span { color: var(--green); } .stat-chip.red span { color: var(--red); } .stat-chip.blue span { color: var(--accent); }

.controls { padding: 10px 20px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
.month-nav { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
.month-nav button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 3px 10px; border-radius: 6px; font-size: 16px; transition: all 0.15s; }
.month-nav button:hover { background: var(--border); color: var(--text); }
.cur-month { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); min-width: 76px; text-align: center; }
.floor-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.floor-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 5px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
.floor-tab:hover { border-color: var(--accent); color: var(--text); }
.floor-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.floor-tab.unpaid-tab:hover { border-color: var(--red); }
.floor-tab.unpaid-tab.active { background: var(--red); border-color: var(--red); color: #fff; }
.btn { padding: 6px 14px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: #6a9ef8; }
.btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text); }
.sort-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all 0.15s; }
.sort-btn:hover { border-color: var(--accent); color: var(--text); }
.sort-btn.active { background: rgba(245,166,35,0.15); border-color: var(--yellow); color: var(--yellow); }
.search-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; width: 160px; margin-left: auto; }
.search-box:focus { border-color: var(--accent); }

.unpaid-panel { margin: 0 20px 12px; background: rgba(240,92,92,0.07); border: 1px solid rgba(240,92,92,0.2); border-radius: 10px; padding: 10px 16px; display: none; }
.unpaid-panel.show { display: block; }
.unpaid-panel h3 { font-size: 12px; color: var(--red); margin-bottom: 6px; font-weight: 700; }
.unpaid-list { display: flex; flex-wrap: wrap; gap: 6px; }
.unpaid-chip { background: rgba(240,92,92,0.1); border: 1px solid rgba(240,92,92,0.25); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--red); }

.table-wrapper { padding: 16px 20px; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; table-layout: fixed; }
col.col-room  { width: 58px; } col.col-slot { width: 26px; } col.col-name { width: 95px; }
col.col-phone { width: 112px; } col.col-fee { width: 88px; } col.col-paid { width: 82px; }
col.col-dep   { width: 65px; } col.col-in { width: 94px; } col.col-pday { width: 56px; }
col.col-out   { width: 94px; } col.col-memo { width: 105px; } col.col-act { width: 76px; }

thead th { background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; padding: 9px 6px; border: 1px solid var(--border); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--yellow); }
th.sortable.sorted { color: var(--yellow); }

.floor-header td { background: linear-gradient(90deg, var(--surface2), var(--bg)); color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 7px 14px; border-top: 2px solid var(--accent); border-bottom: 1px solid var(--border); }
tbody tr:not(.floor-header) { transition: background 0.1s; }
tbody tr:not(.floor-header):hover { background: var(--surface2); }
td { border: 1px solid var(--border); padding: 0; height: var(--row-h); vertical-align: middle; text-align: center; }

.editable { width: 100%; height: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; text-align: center; padding: 0 4px; outline: none; cursor: pointer; }
.editable:focus { background: rgba(79,142,247,0.1); cursor: text; }
.editable::placeholder { color: var(--text3); font-size: 11px; }
.fee-input { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }

.paid-toggle { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
.paid-badge { border-radius: 5px; padding: 3px 7px; font-size: 11px; font-weight: 700; transition: all 0.15s; }
.paid-badge.paid   { background: rgba(52,199,123,0.15); color: var(--green); border: 1px solid rgba(52,199,123,0.3); }
.paid-badge.unpaid { background: rgba(240,92,92,0.15);  color: var(--red);   border: 1px solid rgba(240,92,92,0.3); }
.paid-badge.empty  { background: transparent; color: var(--text3); border: 1px solid var(--border); }

.deposit-badge { border-radius: 5px; padding: 3px 7px; font-size: 11px; font-weight: 700; cursor: pointer; user-select: none; transition: all 0.15s; }
.deposit-badge.yes   { background: rgba(124,92,252,0.15); color: #a78bfa; border: 1px solid rgba(124,92,252,0.3); }
.deposit-badge.no    { background: rgba(240,92,92,0.15);  color: var(--red); border: 1px solid rgba(240,92,92,0.3); }
.deposit-badge.empty { background: transparent; color: var(--text3); border: 1px solid var(--border); }

.act-cell { display: flex; align-items: center; justify-content: center; gap: 2px; height: 100%; padding: 0 2px; }
.act-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 4px; border-radius: 5px; transition: all 0.15s; line-height: 1; }
.act-btn:hover { background: rgba(79,142,247,0.1); color: var(--accent); }
.act-btn.history-btn:hover { background: rgba(124,92,252,0.1); color: var(--accent2); }

tr.has-unpaid td { background: rgba(240,92,92,0.04); }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-bg.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 380px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; padding: 8px 12px; outline: none; }
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { flex: 1; justify-content: center; }
.btn-danger { background: rgba(240,92,92,0.15); border: 1px solid rgba(240,92,92,0.3); color: var(--red); }
.btn-danger:hover { background: rgba(240,92,92,0.25); }

.history-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.history-item .h-name { font-size: 14px; font-weight: 700; color: var(--text); }
.history-item .h-info { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.7; }
.history-item .h-period { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 4px; }
.no-history { text-align: center; color: var(--text3); font-size: 13px; padding: 20px; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.green { border-color: rgba(52,199,123,0.4); }

#dropZone { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
#dropZone:hover { border-color: var(--accent); }

@media (max-width: 700px) { .controls { gap: 5px; } .header-stats { display: none; } .table-wrapper { padding: 8px 2px; } }
</style>
</head>
<body>

<header>
  <h1>🏢 입실료 관리</h1>
  <div class="header-stats">
    <div class="stat-chip" id="syncStatus" style="color:var(--yellow)">⏳ 연결 중...</div>
    <div class="stat-chip blue">총 호실 <span>55</span></div>
    <div class="stat-chip blue">입주 <span id="stat-occupied">0</span></div>
    <div class="stat-chip green">납부 <span id="stat-paid">0</span></div>
    <div class="stat-chip red">미납 <span id="stat-unpaid">0</span></div>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="cur-month" id="curMonth"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="floor-tabs">
    <button class="floor-tab active" onclick="filterFloor('all',this)">전체</button>
    <button class="floor-tab" onclick="filterFloor(3,this)">3층</button>
    <button class="floor-tab" onclick="filterFloor(4,this)">4층</button>
    <button class="floor-tab" onclick="filterFloor(5,this)">5층</button>
    <button class="floor-tab" onclick="filterFloor(6,this)">6층</button>
    <button class="floor-tab unpaid-tab" onclick="filterFloor('unpaid',this)">⚠ 미납만</button>
  </div>
  <button class="sort-btn" id="sortBtn" onclick="toggleSort()">📅 납부일순</button>
  <button class="btn btn-ghost" onclick="toggleUnpaidPanel()">미납현황</button>
  <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV</button>
  <button class="btn btn-ghost" onclick="openImport()">↑ 가져오기</button>
  <input class="search-box" type="text" placeholder="🔍 이름 / 호실" oninput="searchTable(this.value)">
</div>

<div class="unpaid-panel" id="unpaidPanel">
  <h3>⚠ 미납 호실</h3>
  <div class="unpaid-list" id="unpaidList"></div>
</div>

<div class="table-wrapper">
  <table id="mainTable">
    <colgroup>
      <col class="col-room"><col class="col-slot"><col class="col-name">
      <col class="col-phone"><col class="col-fee"><col class="col-paid">
      <col class="col-dep"><col class="col-in"><col class="col-pday">
      <col class="col-out"><col class="col-memo"><col class="col-act">
    </colgroup>
    <thead>
      <tr>
        <th>호실</th><th>#</th><th>입주자명</th><th>전화번호</th>
        <th>입실료</th><th>납부상태</th><th>보증금</th>
        <th>입실일</th>
        <th class="sortable" id="th-pday" onclick="toggleSort()">납부일 ↕</th>
        <th>퇴실일</th><th>메모</th><th>관리</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- 편집 모달 -->
<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal">
    <h2 id="modalTitle">🏠 호실 정보</h2>
    <div class="modal-field"><label>입주자명</label><input class="modal-input" id="m-name" placeholder="이름"></div>
    <div class="modal-field"><label>전화번호</label><input class="modal-input" id="m-phone" placeholder="010-0000-0000"></div>
    <div class="modal-field"><label>입실료 (원)</label><input class="modal-input" id="m-fee" type="number" placeholder="0"></div>
    <div class="modal-field"><label>납부일 (매월 몇 일)</label><input class="modal-input" id="m-payday" type="number" min="1" max="31" placeholder="예: 13"></div>
    <div class="modal-field"><label>입실일</label><input class="modal-input" id="m-in" type="date"></div>
    <div class="modal-field"><label>퇴실일</label><input class="modal-input" id="m-out" type="date"></div>
    <div class="modal-field">
      <label>보증금</label>
      <select class="modal-input" id="m-deposit">
        <option value="">미설정</option>
        <option value="yes">있음 (10만원)</option>
        <option value="no">없음</option>
      </select>
    </div>
    <div class="modal-field"><label>메모</label><input class="modal-input" id="m-memo" placeholder="메모"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="checkoutSlot()">🚪 퇴실처리</button>
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<!-- 히스토리 모달 -->
<div class="modal-bg" id="historyBg" onclick="closeHistoryBg(event)">
  <div class="modal" style="width:420px">
    <h2 id="historyTitle">📋 입실 히스토리</h2>
    <div class="history-list" id="historyList"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeHistory()" style="flex:1;justify-content:center">닫기</button>
    </div>
  </div>
</div>

<!-- 가져오기 모달 -->
<div class="modal-bg" id="importBg" onclick="closeImportBg(event)">
  <div class="modal" style="width:440px">
    <h2>↑ 파일 가져오기</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.7">
      CSV 또는 엑셀(.xlsx) 파일을 업로드하세요.<br>
      <span style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px">호실 · 입주자명(성명) · 전화번호(연락처) · 입실료 · 입실일 · 퇴실일 · 보증금 · 메모</span>
    </p>
    <div id="dropZone"
      onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
      ondragleave="this.style.borderColor='var(--border)'"
      ondrop="handleDrop(event)">
      <div style="font-size:26px;margin-bottom:6px">📂</div>
      <div style="font-size:13px;color:var(--text2)">클릭하거나 파일을 드래그하세요</div>
      <div style="font-size:11px;color:var(--text3);margin-top:3px">.csv / .xlsx 지원</div>
    </div>
    <input type="file" id="fileInput" accept=".csv,.xlsx" style="display:none" onchange="handleFileSelect(this)">
    <div id="importPreview" style="display:none">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px" id="previewInfo"></div>
      <div style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        <table style="width:100%;border-collapse:collapse" id="previewTable"></table>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--text2)">
        가져올 월:
        <select id="importMonth" class="modal-input" style="width:auto;display:inline-block;padding:4px 10px;margin-left:6px;font-size:12px"></select>
      </div>
      <div style="margin-top:6px;font-size:11px;color:var(--yellow)">⚠ 같은 호실에 기존 슬롯이 있으면 새 슬롯으로 추가됩니다.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeImport()">취소</button>
      <button class="btn btn-primary" id="importConfirmBtn" onclick="confirmImport()" style="display:none">가져오기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBZSWxnt6L72Xns8298aR3V5lHoXV--mg",
  authDomain: "roomfee.firebaseapp.com",
  projectId: "roomfee",
  storageBucket: "roomfee.firebasestorage.app",
  messagingSenderId: "493536101790",
  appId: "1:493536101790:web:895e43e5506c8f6b05c28f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DATA_DOC = doc(db, 'roomfee', 'data2');

// data[roomNum] = { slots:[{id,name,phone,fee,payday,deposit,in,out,memo,paid:{YYYY-MM}}], history:[...] }
let data = {};
let dbReady = false;
let skipNextRender = false;

function startSync() {
  onSnapshot(DATA_DOC, snap => {
    if (snap.exists()) { Object.keys(data).forEach(k=>delete data[k]); Object.assign(data, snap.data()); }
    if (!dbReady) { dbReady=true; setSyncStatus('☁ 동기화됨','var(--green)'); }
    if (skipNextRender) { skipNextRender=false; }
    else renderTable();
  }, err => { setSyncStatus('⚠ 연결 오류','var(--red)'); console.error(err); });
}
function setSyncStatus(t,c) { const el=document.getElementById('syncStatus'); el.textContent=t; el.style.color=c; }
async function save() { try { await setDoc(DATA_DOC, data); } catch(e) { showToast('❗ 저장 실패: '+e.message); } }

// ── ROOMS ──
const FLOORS = { 3:rng(301,315), 4:rng(401,414), 5:rng(501,516), 6:rng(601,614) };
const ROOMS = [];
Object.entries(FLOORS).forEach(([fl,nums])=>nums.forEach(n=>ROOMS.push({floor:+fl,room:n})));
function rng(a,b){return Array.from({length:b-a},(_,i)=>a+i);}

// ── STATE ──
let curYear=new Date().getFullYear(), curMonthIdx=new Date().getMonth();
let curFloor='all', sortByPayDay=false, filterUnpaid=false;
let editingRoom=null, editingSlotId=null;

function monthKey(y,m){if(y===undefined)y=curYear;if(m===undefined)m=curMonthIdx;return `${y}-${String(m+1).padStart(2,'0')}`;}

function getSlots(roomNum) {
  const slots=(data[roomNum]?.slots)||[];
  return slots.filter(s=>{
    // 이름 없어도 새로 추가된 슬롯은 표시 (id만 있으면 OK)
    if(!s.id) return false;
    if(s.out){const oYM=new Date(s.out).getFullYear()*12+new Date(s.out).getMonth();if(curYear*12+curMonthIdx>oYM)return false;}
    return true;
  });
}
function getHistory(r){return data[r]?.history||[];}
function getPaid(room,slotId){const s=data[room]?.slots?.find(x=>x.id===slotId);return s?.paid?.[monthKey()]||'empty';}
function setPaid(room,slotId,val){
  const s=data[room]?.slots?.find(x=>x.id===slotId);if(!s)return;
  if(!s.paid)s.paid={};s.paid[monthKey()]=val;save();
}
function updateSlot(room,slotId,patch){
  const s=data[room]?.slots?.find(x=>x.id===slotId);if(!s)return;Object.assign(s,patch);save();
}
function addSlot(roomNum){
  if(!data[roomNum])data[roomNum]={slots:[],history:[]};
  if(!data[roomNum].slots)data[roomNum].slots=[];
  if(!data[roomNum].history)data[roomNum].history=[];
  const id=Date.now()+'_'+Math.random().toString(36).slice(2,5);
  data[roomNum].slots.push({id,name:'',phone:'',fee:'',payday:'',deposit:'',in:'',out:'',memo:'',paid:{}});
  skipNextRender=true;
  save();
  renderTable();
  setTimeout(()=>{
    const rows=document.querySelectorAll(`tr[data-room="${roomNum}"]`);

// ── MONTH ──
function changeMonth(d){
  curMonthIdx+=d;if(curMonthIdx>11){curMonthIdx=0;curYear++;}if(curMonthIdx<0){curMonthIdx=11;curYear--;}
  renderMonth();renderTable();
}
function renderMonth(){document.getElementById('curMonth').textContent=`${curYear}.${String(curMonthIdx+1).padStart(2,'0')}`;}

// ── FILTER/SORT ──
function filterFloor(fl,btn){
  curFloor=fl;filterUnpaid=(fl==='unpaid');
  document.querySelectorAll('.floor-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(filterUnpaid&&!sortByPayDay){sortByPayDay=true;updateSortUI();}
  renderTable();
}
function toggleSort(){sortByPayDay=!sortByPayDay;updateSortUI();renderTable();}
function updateSortUI(){
  document.getElementById('sortBtn').classList.toggle('active',sortByPayDay);
  document.getElementById('sortBtn').textContent=sortByPayDay?'📅 납부일순 ✓':'📅 납부일순';
  const th=document.getElementById('th-pday');
  th.textContent=sortByPayDay?'납부일 ▲':'납부일 ↕';th.classList.toggle('sorted',sortByPayDay);
}
function payDay(room,slotId){
  const s=data[room]?.slots?.find(x=>x.id===slotId);if(!s)return 999;
  if(s.payday)return parseInt(s.payday);if(s.in)return new Date(s.in).getDate()||999;return 999;
}

// ── RENDER ──
function renderTable(){
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  const floors=(curFloor==='all'||curFloor==='unpaid')?[3,4,5,6]:[curFloor];
  let targets=[];
  floors.forEach(fl=>FLOORS[fl].forEach(roomNum=>{
    const slots=getSlots(roomNum);
    if(filterUnpaid){slots.filter(s=>getPaid(roomNum,s.id)==='unpaid').forEach(s=>targets.push({floor:fl,room:roomNum,slot:s}));}
    else{if(!slots.length)targets.push({floor:fl,room:roomNum,slot:null});else slots.forEach(s=>targets.push({floor:fl,room:roomNum,slot:s}));}
  }));

  if(filterUnpaid&&!targets.length){
    tbody.innerHTML=`<tr><td colspan="12" style="padding:28px;color:var(--green);font-size:14px;text-align:center">✅ 미납 호실이 없습니다!</td></tr>`;
    updateStats();updateUnpaidPanel();return;
  }

  if(sortByPayDay){
    targets.sort((a,b)=>(a.slot?payDay(a.room,a.slot.id):999)-(b.slot?payDay(b.room,b.slot.id):999));
    let lastDay=null;
    targets.forEach(({floor,room,slot})=>{
      const day=slot?payDay(room,slot.id):999;
      if(day!==lastDay){lastDay=day;const fh=document.createElement('tr');fh.className='floor-header';
        fh.innerHTML=`<td colspan="12">📅 ${day===999?'납부일 미설정':`매월 ${day}일 납부`}</td>`;tbody.appendChild(fh);}
      tbody.appendChild(buildRow(room,floor,slot));
    });
  } else {
    floors.forEach(fl=>{
      const flT=targets.filter(t=>t.floor===fl);if(!flT.length)return;
      const fh=document.createElement('tr');fh.className='floor-header';
      fh.innerHTML=`<td colspan="12">${fl}층 · ${FLOORS[fl].length}개 호실</td>`;tbody.appendChild(fh);
      const rooms=[...new Set(flT.map(t=>t.room))];
      rooms.forEach(roomNum=>{
        const rt=flT.filter(t=>t.room===roomNum);
        rt.forEach(({slot},idx)=>tbody.appendChild(buildRow(roomNum,fl,slot,idx,rt.length)));
      });
    });
  }
  updateStats();updateUnpaidPanel();
}

}

  const badge=container.querySelector('.paid-badge');

function processFile(file){
  const n=file.name.toLowerCase();
  if(n.endsWith('.csv')){const r=new FileReader();r.onload=e=>parseCSV(e.target.result);r.readAsText(file,'utf-8');}
  else if(n.endsWith('.xlsx')){
    if(!window.XLSX){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>readXLSX(file);s.onerror=()=>showToast('❗ xlsx 로드 실패');document.head.appendChild(s);}
    else readXLSX(file);
  } else showToast('❗ .csv 또는 .xlsx만 지원합니다');
}

function buildColMap(headers){
  const aliases={room:['호실'],name:['성명','입주자명','이름'],phone:['연락처','전화번호','핸드폰','휴대폰'],
    fee:['입실료','월세','금액'],paid:['납부상태'],deposit:['보증금'],in:['입실일','입주일'],out:['퇴실일','퇴주일'],memo:['메모','비고']};
  const cm={};
  headers.forEach((h,i)=>{if(!h)return;const hs=String(h).trim();
    for(const[k,ns]of Object.entries(aliases)){if(ns.some(n=>hs===n||hs.includes(n))){cm[k]=i;break;}}});
  return cm;
}

function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){showToast('❗ 데이터가 없습니다');return;}
  const headers=splitCSV(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
  const cm=buildColMap(headers);if(cm.room===undefined){showToast('❗ 호실 컬럼을 찾을 수 없습니다');return;}
  importRows=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSV(lines[i]).map(c=>c.trim().replace(/^"|"$/g,''));
    if(!cols.length||cols.every(c=>!c))continue;
    const room=parseInt(cols[cm.room]);if(!room||!ROOMS.find(r=>r.room===room))continue;
    importRows.push(buildImportRow(room,cols,cm,s=>normalizeDate(s)));
  }
  if(!importRows.length){showToast('❗ 인식된 호실 데이터가 없습니다');return;}
  showPreview();
}

function readXLSX(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const allRows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
    let hIdx=0;
    for(let i=0;i<Math.min(5,allRows.length);i++){const nx=allRows[i+1];if(nx&&nx[0]&&!isNaN(parseInt(nx[0]))){hIdx=i;break;}}
    let hRow=allRows[hIdx],prev=null;
    if(hIdx+1<allRows.length){const nr=allRows[hIdx+1];if(nr&&isNaN(parseInt(nr[0]))){prev=hRow;hRow=nr;hIdx++;}}
    const len=Math.max(hRow.length,prev?prev.length:0);
    const merged=Array.from({length:len},(_,i)=>(hRow[i]||null)||(prev?(prev[i]||null):null));
    const cm=buildColMap(merged.map(h=>h?String(h).trim():''));
    if(cm.room===undefined){showToast('❗ 호실 컬럼을 찾을 수 없습니다');return;}
    importRows=[];
    for(let i=hIdx+1;i<allRows.length;i++){
      const cols=allRows[i];if(!cols||!cols.length)continue;
      const room=parseInt(cols[cm.room]);if(!room||!ROOMS.find(r=>r.room===room))continue;
      importRows.push(buildImportRow(room,cols,cm,xlsxDate));
    }
    if(!importRows.length){showToast('❗ 인식된 호실 데이터가 없습니다');return;}
    showPreview();
  };
  reader.readAsArrayBuffer(file);
}

function buildImportRow(room,cols,cm,dateConv){
  const get=(k,d='')=>cm[k]!==undefined?(cols[cm[k]]??d):d;
  const name=String(get('name')).trim();
  if(name==='공실')return{room,name:'',phone:'',fee:'',deposit:'',in:'',out:'',memo:''};
  const fee=parseInt(String(get('fee')).replace(/,/g,''))||'';
  const depRaw=get('deposit');const depNum=parseFloat(depRaw);
  let deposit='';
  if(!isNaN(depNum))deposit=depNum>0?'yes':'no';
  else{const ds=String(depRaw);deposit=ds.includes('없')?'no':ds.includes('있')?'yes':'';}
  const outRaw=cols[cm.out];
  const outDate=cm.out!==undefined?(typeof outRaw==='string'?normalizeDate(outRaw):dateConv(outRaw)):'';
  const outStr=String(outRaw||'').trim();
  const memo=(!outDate&&outStr&&outStr!=='undefined')?outStr:String(get('memo')).trim();
  const pRaw=String(get('paid'));
  const paid=pRaw.includes('납부완료')||pRaw==='paid'?'paid':pRaw.includes('미납')||pRaw==='unpaid'?'unpaid':'';
  const inRaw=cols[cm.in];
  return{room,name,phone:String(get('phone')).trim().replace(/^-$/,''),fee,deposit,
    in:cm.in!==undefined?(typeof inRaw==='string'?normalizeDate(inRaw):dateConv(inRaw)):'',
    out:outDate,memo,paid};
}

function showPreview(){
  document.getElementById('importPreview').style.display='block';
  document.getElementById('importConfirmBtn').style.display='';
  document.getElementById('previewInfo').textContent=`✅ ${importRows.length}개 호실 데이터 인식됨`;
  const th='padding:5px 8px;background:var(--surface2);color:var(--text2);font-size:10px;border:1px solid var(--border)';
  const td='padding:4px 8px;border:1px solid var(--border);color:var(--text);font-size:11px';
  document.getElementById('previewTable').innerHTML=
    `<tr><th style="${th}">호실</th><th style="${th}">이름</th><th style="${th}">전화</th><th style="${th}">입실료</th><th style="${th}">입실일</th></tr>`+
    importRows.slice(0,8).map(r=>`<tr><td style="${td}">${r.room}</td><td style="${td}">${r.name}</td><td style="${td}">${r.phone}</td><td style="${td}">${r.fee?Number(r.fee).toLocaleString():''}</td><td style="${td}">${r.in}</td></tr>`).join('')+
    (importRows.length>8?`<tr><td colspan="5" style="${td};color:var(--text3);text-align:center">... 외 ${importRows.length-8}개</td></tr>`:'');
}

function confirmImport(){
  const mk=document.getElementById('importMonth').value;let count=0;
  importRows.forEach(row=>{
    if(!row.name)return;
    if(!data[row.room])data[row.room]={slots:[],history:[]};
    if(!data[row.room].slots)data[row.room].slots=[];
    if(!data[row.room].history)data[row.room].history=[];
    const id=Date.now()+'_'+Math.random().toString(36).slice(2,5)+'_'+row.room;
    const paidObj={};if(row.paid)paidObj[mk]=row.paid;
    data[row.room].slots.push({id,name:row.name,phone:row.phone,fee:row.fee,payday:row.payday||'',
      deposit:row.deposit,in:row.in,out:row.out,memo:row.memo,paid:paidObj});
    count++;
  });
  save();closeImport();renderTable();showToast(`✅ ${count}개 데이터 가져오기 완료!`,'green');
}

function splitCSV(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){if(line[i]==='"')q=!q;else if(line[i]===','&&!q){r.push(c);c='';}else c+=line[i];}r.push(c);return r;}
function normalizeDate(s){if(!s)return '';if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const m=s.match(/(\d{4})[.\/-](\d{1,2})[.\/-](\d{1,2})/);if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;return '';}
function xlsxDate(v){if(!v&&v!==0)return '';if(v instanceof Date){if(isNaN(v.getTime()))return '';return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;}if(typeof v==='string')return normalizeDate(v);if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));if(isNaN(d.getTime()))return '';return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;}return '';}

// ── TOAST ──
let toastTimer;
function showToast(msg,cls=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${cls}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',2500);}

// ── WINDOW EXPORTS ──
Object.assign(window,{changeMonth,filterFloor,toggleSort,toggleUnpaidPanel,exportCSV,
  openImport,closeImport,closeImportBg,handleDrop,handleFileSelect,confirmImport,
  searchTable,quickSave,fmtFeeBlur,cyclePaid,cycleDeposit,savePayday,addSlot,deleteSlot,
  openModal,closeModal,closeModalBg,saveModal,checkoutSlot,
  openHistory,closeHistory,closeHistoryBg});

// ── INIT ──
renderMonth();
renderTable();
startSync();
</script>

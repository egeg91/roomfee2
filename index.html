<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입실료 관리 시스템 (데이터 복구 버전)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350; --accent: #4f8ef7; --accent2: #7c5cfc; --green: #34c77b; --red: #f05c5c; --yellow: #f5a623; --text: #e8eaf6; --text2: #8b90b8; --text3: #555a80; --cell: 120px; --row-h: 48px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-stats { display: flex; gap: 20px; margin-left: auto; align-items: center; }
  .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .stat-chip span { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }
  .controls { padding: 14px 24px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .month-nav { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .month-nav button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 16px; }
  .month-nav .cur-month { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); min-width: 80px; text-align: center; }
  .floor-tabs { display: flex; gap: 4px; }
  .floor-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
  .floor-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .search-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 13px; width: 180px; margin-left: auto; outline: none; }
  .table-wrapper { padding: 20px 24px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  col.col-room { width: 85px; } col.col-name { width: 95px; } col.col-phone { width: 110px; } col.col-fee { width: 90px; } col.col-paid { width: 82px; } col.col-deposit { width: 68px; } col.col-in { width: 96px; } col.col-payday { width: 62px; } col.col-out { width: 96px; } col.col-memo { width: 110px; } col.col-act { width: 52px; }
  thead th { background: var(--surface2); color: var(--text2); font-size: 11px; padding: 10px; border: 1px solid var(--border); }
  .floor-header td { background: linear-gradient(90deg, var(--surface2), var(--bg)); color: var(--accent); font-size: 12px; font-weight: 700; padding: 8px 14px; border-top: 2px solid var(--accent); }
  td { border: 1px solid var(--border); height: var(--row-h); text-align: center; }
  .room-num-box { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .room-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
  .add-line-btn { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 4px; width: 18px; height: 18px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .editable { width: 100%; height: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; text-align: center; outline: none; }
  .paid-badge { border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .paid-badge.paid { background: rgba(52,199,123,0.15); color: var(--green); border: 1px solid rgba(52,199,123,0.3); }
  .paid-badge.unpaid { background: rgba(240,92,92,0.15); color: var(--red); border: 1px solid rgba(240,92,92,0.3); }
  .deposit-badge { border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); }
  .deposit-badge.yes { background: rgba(124,92,252,0.15); color: #a78bfa; border-color: rgba(124,92,252,0.3); }
  .act-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; width: 100%; height: 100%; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 300; }
  .toast.show { opacity: 1; transform: translateY(-10px); }
  tr.sub-line { background: rgba(79, 142, 247, 0.05); }
  /* 모달 스타일 생략(기존 유지) */
</style>
</head>
<body>

<header>
  <h1>🏢 입실료 관리 (복구 완료)</h1>
  <div class="header-stats">
    <div class="stat-chip" id="syncStatus">⏳ 데이터 연결 중...</div>
    <div class="stat-chip blue">입주 <span id="stat-occupied">0</span></div>
    <div class="stat-chip green">납부 <span id="stat-paid">0</span></div>
    <div class="stat-chip red">미납 <span id="stat-unpaid">0</span></div>
  </div>
</header>

<div class="controls">
  <div class="month-nav"><button onclick="changeMonth(-1)">‹</button><span class="cur-month" id="curMonth"></span><button onclick="changeMonth(1)">›</button></div>
  <div class="floor-tabs" id="floorTabs">
    <button class="floor-tab active" onclick="filterFloor('all', this)">전체</button>
    <button class="floor-tab" onclick="filterFloor(3, this)">3층</button>
    <button class="floor-tab" onclick="filterFloor(4, this)">4층</button>
    <button class="floor-tab" onclick="filterFloor(5, this)">5층</button>
    <button class="floor-tab" onclick="filterFloor(6, this)">6층</button>
  </div>
  <input class="search-box" type="text" placeholder="🔍 이름 / 호실 검색" id="searchInput">
</div>

<div class="table-wrapper">
  <table id="mainTable">
    <colgroup><col class="col-room"><col class="col-name"><col class="col-phone"><col class="col-fee"><col class="col-paid"><col class="col-deposit"><col class="col-in"><col class="col-payday"><col class="col-out"><col class="col-memo"><col class="col-act"></colgroup>
    <thead><tr><th>호실</th><th>입주자명</th><th>전화번호</th><th>입실료</th><th>납부상태</th><th>보증금</th><th>입실일</th><th>납부일</th><th>퇴실일</th><th>메모</th><th></th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyDBZSWxnt6L72Xns8298aR3V5lHoXV--mg", authDomain: "roomfee.firebaseapp.com", projectId: "roomfee", storageBucket: "roomfee.firebasestorage.app", messagingSenderId: "493536101790", appId: "1:493536101790:web:895e43e5506c8f6b05c28f" };
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DATA_DOC = doc(db, 'roomfee', 'data');

const ROOMS = [];
const FLOORS = { 3: 14, 4: 13, 5: 15, 6: 13 };
Object.entries(FLOORS).forEach(([fl, count]) => { for(let i=1; i<=count; i++) ROOMS.push({floor: +fl, room: (+fl * 100) + i}); });

let curYear = new Date().getFullYear();
let curMonthIdx = new Date().getMonth();
let curFloor = 'all';
let data = {};

function monthKey(y=curYear, m=curMonthIdx) { return `${y}-${String(m+1).padStart(2,'0')}`; }

// [복구 로직 핵심] 데이터가 없을 때만 전달에서 가져오고, 입력 중에는 자기 데이터를 유지함
function getMonthData(roomNum, suffix = '') {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  if (data[roomNum] && data[roomNum][fullKey]) return data[roomNum][fullKey];
  
  if (!suffix) {
    let m = curMonthIdx - 1, y = curYear;
    if (m < 0) { m = 11; y--; }
    const prevKey = `${y}-${String(m+1).padStart(2,'0')}`;
    const roomObj = data[roomNum] || {};
    
    // 전달 sub(추가입실) 정보가 있는지 확인
    const lastSubKey = Object.keys(roomObj).filter(k => k.startsWith(prevKey + '_sub')).sort().pop();
    if (lastSubKey) return { ...roomObj[lastSubKey], paid: '' };
    
    // 전달 메인 정보 확인
    if (roomObj[prevKey]) {
      const prev = roomObj[prevKey];
      if (prev.out) {
        const outD = new Date(prev.out);
        if (outD.getFullYear() === y && outD.getMonth() === m) return {};
      }
      return { ...prev, paid: '' };
    }
  }
  return {};
}

async function quickSave(roomNum, suffix, patch) {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  if (!data[roomNum]) data[roomNum] = {};
  
  // 현재 데이터가 없으면 초기값 생성 후 패치
  const current = data[roomNum][fullKey] || getMonthData(roomNum, suffix);
  data[roomNum][fullKey] = { ...current, ...patch };
  
  await setDoc(DATA_DOC, data);
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  const mk = monthKey();
  const floors = curFloor === 'all' ? [3,4,5,6] : [curFloor];

  floors.forEach(fl => {
    const fhTr = document.createElement('tr'); fhTr.className = 'floor-header';
    fhTr.innerHTML = `<td colspan="11">${fl}층</td>`;
    tbody.appendChild(fhTr);

    ROOMS.filter(r => r.floor === fl).forEach(

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350; --accent: #4f8ef7; --accent2: #7c5cfc; --green: #34c77b; --red: #f05c5c; --text: #e8eaf6; --text2: #8b90b8; --row-h: 48px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .controls { padding: 14px 24px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
  .month-nav { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .month-nav button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px 10px; font-size: 16px; }
  .cur-month { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); min-width: 80px; text-align: center; }
  .floor-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
  .floor-tab.active { background: var(--accent); color: #fff; }
  .table-wrapper { padding: 20px 24px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th { background: var(--surface2); color: var(--text2); font-size: 11px; padding: 10px; border: 1px solid var(--border); }
  td { border: 1px solid var(--border); height: var(--row-h); text-align: center; }
  .floor-header td { background: linear-gradient(90deg, var(--surface2), var(--bg)); color: var(--accent); font-size: 12px; font-weight: 700; padding: 8px 14px; text-align: left; }
  .editable { width: 100%; height: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; text-align: center; outline: none; }
  .editable:focus { background: rgba(79,142,247,0.1); }
  .room-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
  .add-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 4px; width: 22px; height: 22px; cursor: pointer; font-size: 14px; }
  tr.sub-line { background: rgba(79, 142, 247, 0.08); }
  .paid-badge { border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .paid-badge.paid { background: rgba(52,199,123,0.15); color: var(--green); border: 1px solid rgba(52,199,123,0.3); }
  .paid-badge.unpaid { background: rgba(240,92,92,0.15); color: var(--red); border: 1px solid rgba(240,92,92,0.3); }
  .refresh-btn { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<header>

let curYear = new Date().getFullYear();

function monthKey(y=curYear, m=curMonthIdx) { return `${y}-${String(m+1).padStart(2,'0')}`; }

// 승계 및 데이터 표시 함수
function getDisplayData(roomNum, suffix = '') {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  if (data[roomNum] && data[roomNum][fullKey]) return data[roomNum][fullKey];
  
  if (!suffix) {
    let m = curMonthIdx - 1, y = curYear;
    if (m < 0) { m = 11; y--; }
    const prevKey = `${y}-${String(m+1).padStart(2,'0')}`;
    const roomObj = data[roomNum] || {};
    
    // 전달 추가입실 정보 확인
    const subKeys = Object.keys(roomObj).filter(k => k.startsWith(prevKey + '_sub')).sort();
    if (subKeys.length > 0) return { ...roomObj[subKeys[subKeys.length-1]], paid: '' };
    
    // 전달 메인 정보 승계
    if (roomObj[prevKey]) {
      const prev = roomObj[prevKey];
      if (prev.out) {
        const outD = new Date(prev.out);
        if (outD.getFullYear() === y && outD.getMonth() === m) return {};
      }
      return { ...prev, paid: '' };
    }
  }
  return {};
}

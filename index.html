<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입실료 관리 - 데이터 강제 복구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* 스타일은 사용자님의 눈에 익은 기존 스타일을 그대로 유지합니다 */
  :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350; --accent: #4f8ef7; --accent2: #7c5cfc; --green: #34c77b; --red: #f05c5c; --yellow: #f5a623; --text: #e8eaf6; --text2: #8b90b8; --text3: #555a80; --row-h: 48px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .controls { padding: 14px 24px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
  .month-nav { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .month-nav button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px 10px; font-size: 16px; }
  .cur-month { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); min-width: 80px; text-align: center; }
  .floor-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
  .floor-tab.active { background: var(--accent); color: #fff; }
  .table-wrapper { padding: 20px 24px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th { background: var(--surface2); color: var(--text2); font-size: 11px; padding: 10px; border: 1px solid var(--border); }
  td { border: 1px solid var(--border); height: var(--row-h); text-align: center; }
  .floor-header td { background: linear-gradient(90deg, var(--surface2), var(--bg)); color: var(--accent); font-size: 12px; font-weight: 700; padding: 8px 14px; text-align: left; }
  .editable { width: 100%; height: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; text-align: center; outline: none; }
  .editable:focus { background: rgba(79,142,247,0.1); }
  .room-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
  .add-btn { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 4px; width: 20px; height: 20px; cursor: pointer; }
  tr.sub-line { background: rgba(79, 142, 247, 0.04); }
  .paid-badge { border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .paid-badge.paid { background: rgba(52,199,123,0.15); color: var(--green); border: 1px solid rgba(52,199,123,0.3); }
  .paid-badge.unpaid { background: rgba(240,92,92,0.15); color: var(--red); border: 1px solid rgba(240,92,92,0.3); }
</style>
</head>
<body>

<header>
  <h1>🏢 입실료 관리 (최종 복구)</h1>
  <div style="margin-left:auto; display:flex; gap:10px;">
    <div class="stat-chip" id="syncStatus">⏳ 연결 중...</div>
    <div class="stat-chip">입주 <span id="stat-occupied" style="color:var(--accent); margin-left:4px">0</span></div>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="cur-month" id="curMonth"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <button class="floor-tab active" onclick="filterFloor('all', this)">전체</button>
  <button class="floor-tab" onclick="filterFloor(3, this)">3층</button>
  <button class="floor-tab" onclick="filterFloor(4, this)">4층</button>
  <button class="floor-tab" onclick="filterFloor(5, this)">5층</button>
  <button class="floor-tab" onclick="filterFloor(6, this)">6층</button>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th style="width:80px">호실</th><th style="width:100px">이름</th><th style="width:120px">전화번호</th>
        <th style="width:100px">입실료</th><th style="width:90px">상태</th><th style="width:100px">입실일</th>
        <th style="width:60px">날짜</th><th style="width:100px">퇴실일</th><th>메모</th><th style="width:50px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyDBZSWxnt6L72Xns8298aR3V5lHoXV--mg", authDomain: "roomfee.firebaseapp.com", projectId: "roomfee", storageBucket: "roomfee.firebasestorage.app", messagingSenderId: "493536101790", appId: "1:493536101790:web:895e43e5506c8f6b05c28f" };
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DATA_DOC = doc(db, 'roomfee', 'data');

const ROOMS = [];
const FLOORS = { 3: 14, 4: 13, 5: 15, 6: 13 };
Object.entries(FLOORS).forEach(([fl, count]) => { for(let i=1; i<=count; i++) ROOMS.push({floor: +fl, room: (+fl * 100) + i}); });

let curYear = new Date().getFullYear();
let curMonthIdx = new Date().getMonth();
let curFloor = 'all';
let data = {};

// ──────────────────── 핵심 데이터 매칭 함수 ────────────────────
function monthKey(y=curYear, m=curMonthIdx) { return `${y}-${String(m+1).padStart(2,'0')}`; }

function getRoomData(roomNum, suffix = '') {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  
  // 1. 현재 달 데이터가 있으면 반환
  if (data[roomNum] && data[roomNum][fullKey]) return data[roomNum][fullKey];
  
  // 2. 메인 라인 승계 로직 (수동 입력 방지용)
  if (!suffix) {
    let m = curMonthIdx - 1, y = curYear;
    if (m < 0) { m = 11; y--; }
    const prevKey = `${y}-${String(m+1).padStart(2,'0')}`;
    const roomObj = data[roomNum] || {};
    
    // 전달 추가라인(교체입실)이 있었다면 이번달 메인으로
    const lastSubKey = Object.keys(roomObj).filter(k => k.startsWith(prevKey + '_sub')).sort().pop();
    if (lastSubKey) return { ...roomObj[lastSubKey], paid: '' };
    
    // 전달 메인라인 승계
    if (roomObj[prevKey]) {
      const prev = roomObj[prevKey];
      if (prev.out) {
        const outD = new Date(prev.out);
        if (outD.getFullYear() === y && outD.getMonth() === m) return {};
      }
      return { ...prev, paid: '' };
    }
  }
  return {};
}

async function save(roomNum, suffix, patch) {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  if (!data[roomNum]) data[roomNum] = {};
  
  // 기존 데이터와 합치기
  const current = data[roomNum][fullKey] || getRoomData(roomNum, suffix);
  data[roomNum][fullKey] = { ...current, ...patch };
  
  await setDoc(DATA_DOC, data);
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const mk = monthKey();
  const floors = curFloor === 'all' ? [3,4,5,6] : [curFloor];

  floors.forEach(fl => {
    tbody.innerHTML += `<tr class="floor-header"><td colspan="10">${fl}층</td></tr>`;
    ROOMS.filter(r => r.floor === fl).forEach(r => {
      // 메인 라인
      tbody.appendChild(createRow(r.room, ''));
      // 서브 라인
      for(let i=1; i<=3; i++) {
        if (data[r.room] && data[r.room][`${mk}_sub${i}`]) {
          tbody.appendChild(createRow(r.room, `sub${i}`));
        }
      }
    });
  });
  
  // 통계 업데이트
  let count = 0;
  Object.values(data).forEach(room => { if(room[mk] && room[mk].name) count++; });
  document.getElementById('stat-occupied').textContent = count;
  document.getElementById('curMonth').textContent = `${curYear}.${String(curMonthIdx+1).padStart(2,'0')}`;

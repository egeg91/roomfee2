<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입실료 관리 시스템 (자동 승계 버전)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* 스타일은 이전과 동일하게 유지됩니다 (지면상 생략, 실제 파일에는 포함) */
  :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350; --accent: #4f8ef7; --accent2: #7c5cfc; --green: #34c77b; --red: #f05c5c; --yellow: #f5a623; --text: #e8eaf6; --text2: #8b90b8; --text3: #555a80; --cell: 120px; --row-h: 48px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-stats { display: flex; gap: 20px; margin-left: auto; align-items: center; }
  .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .stat-chip span { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }
  .stat-chip.green span { color: var(--green); }
  .stat-chip.red span { color: var(--red); }
  .stat-chip.blue span { color: var(--accent); }
  .controls { padding: 14px 24px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .month-nav { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .month-nav button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 16px; }
  .month-nav .cur-month { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); min-width: 80px; text-align: center; }
  .floor-tabs { display: flex; gap: 4px; }
  .floor-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
  .floor-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .btn-primary { background: var(--accent); color: #fff; }
  .search-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 13px; width: 180px; margin-left: auto; outline: none; }
  .table-wrapper { padding: 20px 24px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  col.col-room { width: 85px; } 
  col.col-name { width: 95px; } col.col-phone { width: 110px; } col.col-fee { width: 90px; } col.col-paid { width: 82px; } col.col-deposit { width: 68px; } col.col-in { width: 96px; } col.col-payday { width: 62px; } col.col-out { width: 96px; } col.col-memo { width: 110px; } col.col-act { width: 52px; }
  thead th { background: var(--surface2); color: var(--text2); font-size: 11px; padding: 10px; border: 1px solid var(--border); }
  .floor-header td { background: linear-gradient(90deg, var(--surface2), var(--bg)); color: var(--accent); font-size: 12px; font-weight: 700; padding: 8px 14px; border-top: 2px solid var(--accent); }
  td { border: 1px solid var(--border); height: var(--row-h); text-align: center; }
  .room-num-box { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .room-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
  .add-line-btn { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 4px; width: 18px; height: 18px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .add-line-btn:hover { border-color: var(--accent); color: var(--accent); }
  .editable { width: 100%; height: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; text-align: center; outline: none; cursor: pointer; }
  .editable:focus { background: rgba(79,142,247,0.1); cursor: text; }
  .paid-badge { border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .paid-badge.paid { background: rgba(52,199,123,0.15); color: var(--green); border: 1px solid rgba(52,199,123,0.3); }
  .paid-badge.unpaid { background: rgba(240,92,92,0.15); color: var(--red); border: 1px solid rgba(240,92,92,0.3); }
  .deposit-badge { border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); }
  .deposit-badge.yes { background: rgba(124,92,252,0.15); color: #a78bfa; border-color: rgba(124,92,252,0.3); }
  .act-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; width: 100%; height: 100%; }
  .act-btn:hover { color: var(--red); }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .modal-bg.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 360px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; outline: none; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 300; }
  .toast.show { opacity: 1; transform: translateY(-10px); }
  tr.sub-line { background: rgba(79, 142, 247, 0.05); }
</style>
</head>
<body>

<header>
  <h1>🏢 입실료 관리 (자동 승계)</h1>
  <div class="header-stats">
    <div class="stat-chip" id="syncStatus">⏳ 연결 중...</div>
    <div class="stat-chip blue">총 호실 <span id="stat-total">55</span></div>
    <div class="stat-chip blue">입주 <span id="stat-occupied">0</span></div>
    <div class="stat-chip green">납부 <span id="stat-paid">0</span></div>
    <div class="stat-chip red">미납 <span id="stat-unpaid">0</span></div>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="cur-month" id="curMonth"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="floor-tabs" id="floorTabs">
    <button class="floor-tab active" onclick="filterFloor('all', this)">전체</button>
    <button class="floor-tab" onclick="filterFloor(3, this)">3층</button>
    <button class="floor-tab" onclick="filterFloor(4, this)">4층</button>
    <button class="floor-tab" onclick="filterFloor(5, this)">5층</button>
    <button class="floor-tab" onclick="filterFloor(6, this)">6층</button>
  </div>
  <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV 내보내기</button>
  <input class="search-box" type="text" placeholder="🔍 이름 / 호실 검색" oninput="searchTable(this.value)">
</div>

<div class="table-wrapper">
  <table id="mainTable">
    <colgroup><col class="col-room"><col class="col-name"><col class="col-phone"><col class="col-fee"><col class="col-paid"><col class="col-deposit"><col class="col-in"><col class="col-payday"><col class="col-out"><col class="col-memo"><col class="col-act"></colgroup>
    <thead>
      <tr><th>호실</th><th>입주자명</th><th>전화번호</th><th>입실료</th><th>납부상태</th><th>보증금</th><th>입실일</th><th>납부일</th><th>퇴실일</th><th>메모</th><th></th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle" style="margin-bottom:20px">🏠 정보 편집</h2>
    <div class="modal-field"><label>입주자명</label><input class="modal-input" id="m-name"></div>
    <div class="modal-field"><label>전화번호</label><input class="modal-input" id="m-phone"></div>
    <div class="modal-field"><label>입실료 (원)</label><input class="modal-input" id="m-fee" type="number"></div>
    <div class="modal-field"><label>입실일</label><input class="modal-input" id="m-in" type="date"></div>
    <div class="modal-field"><label>납부일 (일)</label><input class="modal-input" id="m-payday" type="number" min="1" max="31"></div>
    <div class="modal-field"><label>퇴실일</label><input class="modal-input" id="m-out" type="date"></div>
    <div class="modal-field"><label>보증금</label><select class="modal-input" id="m-deposit"><option value="">미설정</option><option value="yes">있음</option><option value="no">없음</option></select></div>
    <div class="modal-field"><label>메모</label><input class="modal-input" id="m-memo"></div>
    <div style="display:flex; gap:8px; margin-top:20px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyDBZSWxnt6L72Xns8298aR3V5lHoXV--mg", authDomain: "roomfee.firebaseapp.com", projectId: "roomfee", storageBucket: "roomfee.firebasestorage.app", messagingSenderId: "493536101790", appId: "1:493536101790:web:895e43e5506c8f6b05c28f" };
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DATA_DOC = doc(db, 'roomfee', 'data');

const ROOMS = [];
const FLOORS = { 3: 14, 4: 13, 5: 15, 6: 13 };
Object.entries(FLOORS).forEach(([fl, count]) => { for(let i=1; i<=count; i++) ROOMS.push({floor: +fl, room: (+fl * 100) + i}); });

let curYear = new Date().getFullYear();
let curMonthIdx = new Date().getMonth();
let curFloor = 'all';
let data = {};
let editingKey = null;

function monthKey(y=curYear, m=curMonthIdx) { return `${y}-${String(m+1).padStart(2,'0')}`; }

// ──────────────────── [핵심 수정] 데이터 가져오기 및 자동 승계 로직 ────────────────────
function getMonthData(roomNum, suffix = '') {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  const roomObj = data[roomNum] || {};
  
  // 1. 현재 달에 이미 데이터가 있으면 그대로 반환
  if (roomObj[fullKey]) return roomObj[fullKey];
  
  // 2. 메인 라인('')인데 데이터가 없을 경우 전달 정보를 체크 (승계 로직)
  if (!suffix) {
    let m = curMonthIdx - 1, y = curYear;
    if (m < 0) { m = 11; y--; }
    const prevKey = `${y}-${String(m+1).padStart(2,'0')}`;
    
    // [A] 전달에 '추가 라인(sub)'이 있었는지 확인 -> 있었다면 이게 이번 달 메인이 됨
    const lastSubKey = Object.keys(roomObj).filter(k => k.startsWith(prevKey + '_sub')).sort().pop();
    if (lastSubKey && roomObj[lastSubKey]) {
        return { ...roomObj[lastSubKey], paid: '' }; // 추가 라인을 메인으로 승계
    }

    // [B] 전달 추가 라인이 없었다면 전달 '메인 라인' 승계 시도
    if (roomObj[prevKey]) {
      const prev = roomObj[prevKey];
      // 퇴실일이 있고 그게 전달이면 이번 달엔 빈칸 (승계 끊음)
      if (prev.out) {
          const outD = new Date(prev.out);
          if (outD.getFullYear() === y && outD.getMonth() === m) return {};
      }
      return { ...prev, paid: '' }; 
    }
  }
  return {};
}

async function quickSave(roomNum, suffix, patch) {
  const mk = monthKey();
  const fullKey = suffix ? `${mk}_${suffix}` : mk;
  if (!data[roomNum]) data[roomNum] = {};
  if (!data[roomNum][fullKey]) data[roomNum][fullKey] = getMonthData(roomNum, suffix);
  Object.assign(data[roomNum][fullKey], patch);
  await setDoc(DATA_DOC, data);
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const mk = monthKey();
  const floors = curFloor === 'all' ? [3,4,5,6] : [curFloor];

  floors.forEach(fl => {
    const fhTr = document.createElement('tr'); fhTr.className = 'floor-header';
    fhTr.innerHTML = `<td colspan="11">${fl}층</td>`;
    tbody.appendChild(fhTr);

    ROOMS.filter(r => r.floor === fl).forEach(r => {
      tbody.appendChild(buildRow(r.room, ''));
      for(let i=1; i<=3; i++) {
        if (data[r.room] && data[r.room][`${mk}_sub${i}`]) tbody.appendChild(buildRow(r.room, `sub${i}`));
      }
    });
  });
  updateStats();
}

function buildRow(roomNum, suffix) {
  const d = getMonthData(roomNum, suffix);
  const tr = document.createElement('tr');
  if (suffix) tr.className = 'sub-line';
  const paid = d.paid || 'empty'; const deposit = d.deposit || 'empty';
  tr.innerHTML = `
    <td><div class="room-num-box"><span class="room-num">${suffix ? '' : roomNum}</span>${!suffix ? `<button class="add-line-btn" onclick="addNewLine(${roomNum})">+</button>` : `<span style="font-size:10px; color:var(--text3)">추가</span>`}</div></td>
    <td><input class="editable" value="${d.name||''}" onchange="quickSave(${roomNum},'${suffix}',{name:this.value})"></td>
    <td><input class="editable" value="${d.phone||''}" onchange="quickSave(${roomNum},'${suffix}',{phone:this.value})"></td>
    <td><input class="editable" value="${(d.fee||'').toLocaleString()}" onblur="saveFee(${roomNum},'${suffix}',this)"></td>
    <td><div onclick="cyclePaid(${roomNum},'${suffix}')"><span class="paid-badge ${paid}">${paid==='paid'?'완료':paid==='unpaid'?'미납':'—'}</span></div></td>
    <td><div onclick="cycleDeposit(${roomNum},'${suffix}')"><span class="deposit-badge ${deposit}">${deposit==='yes'?'있음':'—'}</span></div></td>
    <td><input class="editable" type="date" value="${d.in||''}" onchange="quickSave(${roomNum},'${suffix}',{in:this.value})"></td>
    <td><input class="editable" type="number" value="${d.payday||''}" onchange="quickSave(${roomNum},'${suffix}',{payday:this.value})"></td>
    <td><input class="editable" type="date" value="${d.out||''}" onchange="quickSave(${roomNum},'${suffix}',{out:this.value})"></td>
    <td><input class="editable" value="${d.memo||''}" onchange="quickSave(${roomNum},'${suffix}',{memo:this.value})"></td>
    <td>${suffix ? `<button class="act-btn" onclick="removeLine(${roomNum},'${suffix}')">×</button>` : `<button class="act-btn" onclick="openModal(${roomNum},'${suffix}')">✎</button>`}</td>
  `;
  return tr;
}

window.addNewLine = async (roomNum) => {
  const mk = monthKey(); let nextIdx = 1;
  while(data[roomNum] && data[roomNum][`${mk}_sub${nextIdx}`]) nextIdx++;
  if(nextIdx > 3) return alert("최대 4명까지만 등록 가능합니다.");
  await quickSave(roomNum, `sub${nextIdx}`, { name: '교체입실', in: new Date().toISOString().split('T')[0] });
};

window.removeLine = async (roomNum, suffix) => {
  if(!confirm("삭제하시겠습니까?")) return;
  delete data[roomNum][`${monthKey()}_${suffix}`];
  await setDoc(DATA_DOC, data);
};

window.saveFee = (roomNum, suffix, el) => { const val = parseInt(el.value.replace(/,/g,'')) || ''; quickSave(roomNum, suffix, {fee: val}); el.value = val ? val.toLocaleString() : ''; };
window.cyclePaid = (roomNum, suffix) => { const cur = getMonthData(roomNum, suffix).paid || 'empty'; const next = cur === 'empty' ? 'unpaid' : cur === 'unpaid' ? 'paid' : 'empty'; quickSave(roomNum, suffix, {paid: next}); };
window.cycleDeposit = (roomNum, suffix) => { const cur = getMonthData(roomNum, suffix).deposit || 'empty'; const next = cur === 'empty' ? 'yes' : 'empty'; quickSave(roomNum, suffix, {deposit: next}); };
window.changeMonth = (d) => { curMonthIdx += d; if(curMonthIdx > 11) { curMonthIdx=0; curYear++; } if(curMonthIdx < 0) { curMonthIdx=11; curYear--; } document.getElementById('curMonth').textContent = `${curYear}.${String(curMonthIdx+1).padStart(2,'0')}`; renderTable(); };
window.filterFloor = (fl, btn) => { curFloor = fl; document.querySelectorAll('.floor-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTable(); };
window.openModal = (roomNum, suffix) => { editingKey = `${roomNum}_${suffix}`; const d = getMonthData(roomNum, suffix); document.getElementById('m-name').value = d.name || ''; document.getElementById('m-phone').value = d.phone || ''; document.getElementById('m-fee').value = d.fee || ''; document.getElementById('m-in').value = d.in || ''; document.getElementById('m-payday').value = d.payday || ''; document.getElementById('m-out').value = d.out || ''; document.getElementById('m-deposit').value = d.deposit || ''; document.getElementById('m-memo').value = d.memo || ''; document.getElementById('modalBg').classList.add('show'); };
window.closeModal = () => document.getElementById('modalBg').classList.remove('show');
window.saveModal = async () => { const [roomNum, suffix] = editingKey.split('_'); const patch = { name: document.getElementById('m-name').value, phone: document.getElementById('m-phone').value, fee: parseInt(document.getElementById('m-fee').value) || '', in: document.getElementById('m-in').value, payday: document.getElementById('m-payday').value, out: document.getElementById('m-out').value, deposit: document.getElementById('m-deposit').value, memo: document.getElementById('m-memo').value, }; await quickSave(roomNum, suffix, patch); closeModal(); };

function updateStats() {
    let occ=0, p=0, up=0;
    ROOMS.forEach(r => { const d = getMonthData(r.room, ''); if(d.name) { occ++; if(d.paid === 'paid') p++; else if(d.paid === 'unpaid') up++; } });
    document.getElementById('stat-occupied').textContent = occ; document.getElementById('stat-paid').textContent = p; document.getElementById('stat-unpaid').textContent = up;
}

onSnapshot(DATA_DOC, (snap) => {
  if (snap.exists()) data = snap.data();
  document.getElementById('syncStatus').textContent = '☁ 연결됨';
  document.getElementById('syncStatus').style.color = 'var(--green)';
  document.getElementById('curMonth').textContent = `${curYear}.${String(curMonthIdx+1).padStart(2,'0')}`;
  renderTable();
});
</script>
</body>
</html>
